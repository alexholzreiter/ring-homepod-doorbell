services:
  ring-homepod-doorbell:
    image: ghcr.io/alexholzreiter/ring-homepod-doorbell:0.2.3
    restart: unless-stopped
    network_mode: host
    depends_on:
      prepare:
        condition: service_completed_successfully
    environment:
      TZ: ${TZ}
      DATA_DIR: /data
      MEDIA_DIR: /data/media
      WEB_PORT: "8585"
      OWNTONE_URL: http://127.0.0.1:3689
      OWNTONE_MEDIA_PATH: /srv/media
      RING_REFRESH_TOKEN: ${RING_REFRESH_TOKEN}
      RING_CAMERA_NAME: ${RING_CAMERA_NAME}
      DEVICE_NAME: ${DEVICE_NAME}
      HOMEKIT_ENABLED: ${HOMEKIT_ENABLED}
      HOMEKIT_PORT: "47129"
      HOMEKIT_PIN: ${HOMEKIT_PIN}
      HOMEKIT_USERNAME: ${HOMEKIT_USERNAME}
    volumes:
      - ${APP_DATA_DIR}/data:/data
    x-runtipi:
      is_main: true
      internal_port: 8585

  prepare:
    image: ghcr.io/alexholzreiter/ring-homepod-doorbell:0.2.3
    restart: "no"
    user: "0:0"
    command:
      - sh
      - -c
      - mkdir -p /data/media /data/owntone-cache /data/owntone-config && cp /app/owntone.conf /data/owntone-config/owntone.conf && chmod 0644 /data/owntone-config/owntone.conf && chown -R 1000:1000 /data/media /data/owntone-cache /data/owntone-config
    volumes:
      - ${APP_DATA_DIR}/data:/data

  owntone:
    image: docker.io/owntone/owntone:29.2
    restart: unless-stopped
    network_mode: host
    depends_on:
      prepare:
        condition: service_completed_successfully
    environment:
      UID: "1000"
      GID: "1000"
    volumes:
      - ${APP_DATA_DIR}/data/owntone-config:/etc/owntone:ro
      - ${APP_DATA_DIR}/data/media:/srv/media
      - ${APP_DATA_DIR}/data/owntone-cache:/var/cache/owntone

x-runtipi:
  schema_version: 2
