services:
  ring-homepod-doorbell:
    build:
      context: .
    image: ring-homepod-doorbell:local
    container_name: ring-homepod-doorbell
    restart: unless-stopped
    network_mode: host
    depends_on:
      owntone:
        condition: service_started
    environment:
      TZ: ${TZ:-Europe/Vienna}
      DATA_DIR: /data
      MEDIA_DIR: /data/media
      WEB_PORT: "8585"
      OWNTONE_URL: http://127.0.0.1:3689
      OWNTONE_MEDIA_PATH: /srv/media
      RING_REFRESH_TOKEN: ${RING_REFRESH_TOKEN:-}
      RING_CAMERA_NAME: ${RING_CAMERA_NAME:-}
      DEVICE_NAME: ${DEVICE_NAME:-Ring Haustür}
      HOMEKIT_ENABLED: ${HOMEKIT_ENABLED:-false}
      HOMEKIT_PORT: "47129"
      HOMEKIT_PIN: ${HOMEKIT_PIN:-031-45-154}
      HOMEKIT_USERNAME: ${HOMEKIT_USERNAME:-12:34:56:78:90:AB}
    volumes:
      - ./data:/data

  owntone:
    image: docker.io/owntone/owntone:29.2
    container_name: ring-homepod-doorbell-owntone
    restart: unless-stopped
    network_mode: host
    entrypoint:
      - /bin/sh
      - -c
      - |
        mkdir -p /data/media /data/owntone-cache /data/owntone-config
        cat > /data/owntone-config/owntone.conf <<'OWNTONE_CONFIG'
        general {
          uid = "owntone"
          logfile = "/dev/stdout"
          loglevel = log
          trusted_networks = { "localhost" }
          ipv6 = no
          cache_dir = "/var/cache/owntone"
          speaker_autoselect = no
          start_buffer_ms = 1000
        }
        library {
          name = "Ring HomePod Doorbell"
          port = 3689
          directories = { "/srv/media" }
        }
        audio {
          nickname = "Disabled"
          type = "disabled"
        }
        mpd {
          port = 0
        }
        OWNTONE_CONFIG
        chmod 0644 /data/owntone-config/owntone.conf
        chown -R "$${UID}:$${GID}" /data/media /data/owntone-cache /data/owntone-config
        sed -i 's|^command_args=.*|command_args="-f"|' /etc/init.d/owntone
        sed -i '/^command=/a supervisor="supervise-daemon"' /etc/init.d/owntone
        sed -i '/^command=/a respawn_delay=3' /etc/init.d/owntone
        sed -i '/^command=/a respawn_max=0' /etc/init.d/owntone
        exec /sbin/init
    environment:
      UID: ${PUID:-1000}
      GID: ${PGID:-1000}
    volumes:
      - ./data:/data
      - ./data/owntone-config:/etc/owntone:ro
      - ./data/media:/srv/media
      - ./data/owntone-cache:/var/cache/owntone
